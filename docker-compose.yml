version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: coombes-lol-web
    ports:
      - "80:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
